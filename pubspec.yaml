name: mindloop
description: MindLoop - Futuristic Smart Reminder & Budget Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^15.1.2
  get_it: ^8.0.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.2.1
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  audioplayers: ^6.4.0
  table_calendar: ^3.2.0
  fl_chart: ^0.70.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.0
  path: ^1.9.1
  file_selector: ^1.1.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  pdf: ^3.11.3
  excel: ^4.0.6
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/
    - assets/sounds/chime.wav
    - assets/sounds/chime.ogg
    - assets/sounds/soft_bell.wav
    - assets/sounds/soft_bell.ogg
    - assets/sounds/alert.wav
    - assets/sounds/alert.ogg
    - assets/sounds/gentle_pulse.wav
    - assets/sounds/gentle_pulse.ogg
